version: 1
applications:
  - appRoot: auto_video_create_front
    frontend:
      phases:
        preBuild:
          commands:
            # cycle-2.1 BUG-005 fix: Amplify build image 의 nvm 에 node 18 이 사전 설치 안 됨.
            # "nvm use 18" 만으로는 "version not installed" 에러. install 먼저 실행.
            - nvm install 18 && nvm use 18 && npm ci
        build:
          commands:
            - npm run lint:src
            - npm run build
      artifacts:
        baseDirectory: .next
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
